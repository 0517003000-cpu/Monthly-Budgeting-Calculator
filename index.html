<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Budget Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">

    <h1>Monthly Budget Calculator</h1>

    <input type="number" id="income" placeholder="Enter your monthly income">

    <button id="calculateBtn">Calculate</button>

    <div class="results">
      <p id="essentials">Essential Expenses (50%): Rp 0</p>
      <p id="nonEssentials">Non-Essential Expenses (30%): Rp 0</p>
      <p id="savings">Savings (20%): Rp 0</p>
      <p id="moneyLeft">Money Left: Rp 0</p>
    </div>

    <div class="recommendation" id="recommendation"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
